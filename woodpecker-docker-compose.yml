services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v3
    restart: always
    ports:
      - "8000:8000"
    environment:
      WOODPECKER_OPEN: true
      WOODPECKER_HOST: http://your_host:8000
      WOODPECKER_GITHUB: true
      WOODPECKER_GITHUB_CLIENT: your_client
      WOODPECKER_GITHUB_SECRET: your_secret
      WOODPECKER_AGENT_SECRET: yourSecret
      WOODPECKER_ADMIN: yourName
    volumes:
      - woodpecker-server-data:/var/lib/woodpecker/

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v3
    command: agent
    restart: always
    privileged: true
    depends_on:
      - woodpecker-server
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: yourSecret
    volumes:
      - woodpecker-agent-config:/etc/woodecker
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  woodpecker-server-data:
  woodpecker-agent-config:
