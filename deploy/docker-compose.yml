services:
  gavin-db:
    image: postgres:latest
      #env_file:
    #- ./config.env
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER} #speedster
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} #GavinHaydy2779
      POSTGRES_DB: ${POSTGRES_DB} #speedster
      TZ: Asia/Shanghai
    volumes:
      - ./pgsql/gavin.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - speedster-net
    command: ["postgres", "-c", "timezone=Asia/Shanghai"]

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  redis-db:
    image: redis
    volumes:
      - ./redis/data:/data
    command:  redis-server --requirepass  ${REDIS_PASSWORD} #mypassword
    restart: always
    networks:
      - speedster-net
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: etcd
    restart: unless-stopped
    networks:
      - speedster-net
    environment:
      ETCD_NAME: etcd
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: etcd-cluster
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - ./data/etcd:/etcd-data


  gateway:
    build:
      context: .
      dockerfile: gatewayDockerfile
    restart: always
    networks:
      - speedster-net
    ports:
      - "9527:9527"


  iam-api:
    build:
      context: .
      dockerfile: iamApiDockerfile
    restart: always
    networks:
      - speedster-net
    ports:
      - "8888:8888"
    depends_on:
      - redis-db
      - gavin-db

  iam-rpc:
    build:
      context: .
      dockerfile: iamRpcDockerfile
    restart: always
    networks:
      - speedster-net
    ports:
      - "18888:18888"
    depends_on:
      - redis-db
      - gavin-db




networks:
  speedster-net:
    driver: bridge

volumes:
  pg_data:
