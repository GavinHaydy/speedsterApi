syntax = "proto3";

package permission;

option go_package = "./pb";

message PermissionTreeReq {
  string name = 1;
}

message PermissionTreeItem {
  int64 id = 1;
  string name = 2;
  string code = 3;
  string path = 4;
  string method = 5;
  int64 type = 6;
  string icon = 7;
  int64 sort = 8;
  int64 status = 9;
  int64 parent_id = 10;

  repeated PermissionTreeItem children = 11;
}

message PermissionTreeResp {
  repeated PermissionTreeItem list = 1;
}

message RoleIdReq {
  int64 role_id = 1;
}
message RolePermissionResp {
  repeated int64 permission_ids = 1;
}

service Permission{
  rpc PermissionTree(PermissionTreeReq) returns(PermissionTreeResp);
  rpc GetRolePermissions(RoleIdReq) returns(RolePermissionResp);
}