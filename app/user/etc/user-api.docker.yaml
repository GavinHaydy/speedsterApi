Name: user-api
Host: 0.0.0.0
Port: 8888
AesSecretKey: SpeedsterIsBest!
DB:
  DSN: postgres://speedster:speedster@postgres:5432/speedster?sslmode=disable
Redis:
  Host: redis:6379
  Pass: "mypassword"
  Type: node
Auth:
  issuer: SpeedsterApi # 发行者
  prefix: user_token_ # token前缀
  AccessSecret: "SpeedsterIsBest!"
