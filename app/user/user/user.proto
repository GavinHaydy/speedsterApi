syntax = "proto3";

package user;
option go_package = "./pb";

message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginRsp {
  string access_token = 1;
  string refresh_token = 2;
  string time = 3;
}

message RegisterReq {
  string username = 1;
  string password = 2;
  optional string email = 3;
  optional string phone = 4;
}

message RegisterRsp{
  string user_id = 1;
}

message UserListReq {
  string username = 1;
  string email = 2;
  string phone = 3;
  string nickname = 4;
  int64 status = 5;
  int64 page_no = 6;
  int64 page_size = 7;
}

message UserItem {
  string id = 1;
  string username = 2;
  optional string nickname = 3;
  optional string phone = 4;
  optional string email = 5;
  optional string avatar = 6;
  optional int64 status = 7;
}

message UserListResp {
  int64 total = 1;
  repeated UserItem list = 2;
}


service User {
  rpc Login(LoginReq) returns(LoginRsp);
  rpc Register(RegisterReq) returns(RegisterRsp);
  rpc UserList (UserListReq) returns (UserListResp);
}
