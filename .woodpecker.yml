steps:
  build-user:
    image: golang:1.26
    commands:
      - cd app/user
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o user user.go
    when:
      event: push
      branch: main

  build-gateway:
    image: golang:1.26
    commands:
      - cd app/gateway
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o gateway user.go
    when:
      event: push
      branch: main
