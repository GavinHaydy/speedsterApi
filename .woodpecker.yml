steps:
  clone:
    git:
      image: woodpeckerci/plugin-git
      settings:
        partial: false
        depth: 1

  build-user:
    image: golang:1.26
    environment:
      GOPROXY: https://goproxy.cn,direct
      GOSUMDB: sum.golang.google.cn
    volumes:
      - /data/woodpecker-cache:/go/pkg/mod
    commands:
      - cd app/user
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o user user.go
    when:
      event: push
      branch: main

  build-gateway:
    image: golang:1.26
    environment:
      GOPROXY: https://goproxy.cn,direct
      GOSUMDB: sum.golang.google.cn
    volumes:
      - /data/woodpecker-cache:/go/pkg/mod
    commands:
      - cd app/gateway
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o gateway user.go
    when:
      event: push
      branch: main

  deploy:
    image: appleboy/drone-scp
    settings:
      host:
        from_secret: SERVER_HOST
      username:
        from_secret: SERVER_USER
      port:
        from_secret: SERVER_PORT
      key:
        from_secret: SERVER_SSH_KEY
      target: /data/speedster
      source:
        - app/user/user
        - app/user/etc
        - app/gateway/gateway
        - app/gateway/etc
        - docker-compose.yml
    when:
      event: push
      branch: main

  restart:
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: SERVER_HOST
      username:
        from_secret: SERVER_USER
      port:
        from_secret: SERVER_PORT
      key:
        from_secret: SERVER_SSH_KEY
      script:
        - cd /data/speedster
        - docker compose down
        - docker compose up -d
    when:
      event: push
      branch: main