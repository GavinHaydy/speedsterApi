name: Deploy Speedster

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install goctl
        run: |
          go install github.com/zeromicro/go-zero/tools/goctl@latest

      - name: Install goctl-swagger
        run: |
          go install github.com/zeromicro/goctl-swagger@latest

      - name: Generate User Swagger
        run: |
          mkdir -p app/user/docs
          goctl api plugin \
            -plugin goctl-swagger="swagger -filename user.json" \
            -api app/user/user.api \
            -dir app/user/docs

      - name: Generate Gateway Swagger
        run: |
          mkdir -p app/gateway/docs
          goctl api plugin \
            -plugin goctl-swagger="swagger -filename gateway.json" \
            -api app/gateway/gateway.api \
            -dir app/gateway/docs

      ################################
      # 编译
      ################################
      - name: Build User
        working-directory: app/user
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" \
          -o user user.go

      - name: Build Gateway
        working-directory: app/gateway
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" \
          -o gateway gateway.go

      ################################
      # 上传文件
      ################################
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create target dir
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /data/github"

      - name: Upload user
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SERVER_PORT }}" \
            app/user/user \
            app/user/etc \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/data/github/user/

      - name: Upload gateway
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SERVER_PORT }}" \
            app/gateway/gateway \
            app/gateway/etc \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/data/github/gateway/


      ################################
      # docker compose
      ################################
      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /data/speedster
            docker compose down
            docker compose up -d --build